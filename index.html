<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IoT Analytics - Ultra Full Version + FX</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://bernii.github.io/gauge.js/dist/gauge.min.js"></script>

    <style>
        :root { --bg-dark: #05080f; --card-bg: #0f172a; --accent: #3b82f6; }
        body { background-color: var(--bg-dark); color: #e2e8f0; font-family: 'Plus Jakarta Sans', sans-serif; }
        
        .header-glass { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(15px); border-bottom: 1px solid #1e293b; position: sticky; top: 0; z-index: 1000; }
        
        .card-custom { 
            background: var(--card-bg); 
            border: 1px solid #1e293b; 
            border-radius: 1.5rem; 
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3);
            transition: all 0.3s ease;
            height: 100%;
        }
        
        /* Simpel Hover Glow */
        .card-custom:hover { transform: translateY(-5px); border-color: var(--accent); box-shadow: 0 0 15px rgba(59, 130, 246, 0.2); }

        /* Dot Berkedip untuk indikasi data masuk */
        .live-dot {
            width: 8px; height: 8px; background: #10b981; border-radius: 50%;
            display: inline-block; margin-right: 8px;
            box-shadow: 0 0 0 rgba(16, 185, 129, 0.4);
            animation: pulse-dot 2s infinite;
        }
        @keyframes pulse-dot { 0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); } 70% { box-shadow: 0 0 0 10px rgba(16, 185, 129, 0); } 100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); } }

        @keyframes pulse-red { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); } 70% { box-shadow: 0 0 0 15px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }
        .bg-danger-glow { animation: pulse-red 1.5s infinite; border-color: #ef4444 !important; }

        .stat-icon { width: 48px; height: 48px; border-radius: 12px; display: flex; align-items: center; justify-content: center; margin-bottom: 1rem; }
        .val-big { font-size: 2.25rem; font-weight: 800; letter-spacing: -1px; }
        .unit { font-size: 1rem; color: #94a3b8; margin-left: 4px; }
        
        .btn-action { border-radius: 12px; font-weight: 700; padding: 12px 20px; transition: 0.3s; }
        .btn-start { background: #10b981; color: white; border: none; }
        .btn-stop { background: #ef4444; color: white; border: none; }
        
        .badge-status { padding: 8px 16px; border-radius: 30px; font-size: 0.75rem; text-transform: uppercase; font-weight: 800; }
        
        .status-danger { color: #ef4444 !important; text-shadow: 0 0 8px rgba(239, 68, 68, 0.5); }
        .status-safe { color: #10b981 !important; text-shadow: 0 0 8px rgba(16, 185, 129, 0.5); }

        iframe { border-radius: 1.5rem; border: 1px solid #1e293b; height: 450px; width: 100%; background: #fff; }
        .table-dark { --bs-table-bg: transparent; border-color: #2d3748; }

        canvas.gauge-canvas { width: 100% !important; height: auto !important; max-width: 150px; margin: 10px auto; display: block; }
    </style>
</head>
<body>

    <nav class="header-glass py-3 mb-4">
        <div class="container d-flex justify-content-between align-items-center">
            <div class="d-flex align-items-center">
                <i class="fas fa-bolt text-warning me-2 fs-4"></i>
                <h5 class="mb-0 fw-bold">PROYEK MONITORING IOT</h5>
            </div>
            <span id="logStatus" class="badge-status bg-secondary"><i class="fas fa-pause-circle me-1"></i> Idle</span>
        </div>
    </nav>

    <div class="container">
        <div class="row mb-4">
            <div class="col-12">
                <div class="card-custom p-3 d-flex flex-wrap align-items-center gap-3">
                    <button id="btnStart" class="btn-action btn-start"><i class="fas fa-play me-2"></i>START LOGGING</button>
                    <button id="btnStop" class="btn-action btn-stop"><i class="fas fa-stop me-2"></i>STOP</button>
                    <button id="btnReset" class="btn btn-outline-light border-secondary btn-action">RESET TABLE</button>
                    
                    <div class="ms-md-auto d-flex align-items-center gap-2">
                        <span class="live-dot" id="liveDot" style="display:none;"></span>
                        <span class="small text-secondary fw-bold">JEDA (DETIK):</span>
                        <input type="number" id="intervalInput" class="form-control bg-dark text-white border-secondary shadow-none" value="2" style="width: 80px; border-radius: 10px;">
                    </div>
                </div>
            </div>
        </div>

        <div class="row g-4 mb-4">
            <div class="col-md-3 text-center">
                <div class="card-custom p-4">
                    <div class="stat-icon bg-danger bg-opacity-10 text-danger mx-auto"><i class="fas fa-thermometer-half"></i></div>
                    <p class="text-secondary small fw-bold mb-1">TEMPERATUR</p>
                    <div class="val-big text-white"><span id="txtSuhu">0.0</span><span class="unit">°C</span></div>
                    <canvas id="gaugeSuhu" class="gauge-canvas"></canvas>
                </div>
            </div>
            <div class="col-md-3 text-center">
                <div class="card-custom p-4">
                    <div class="stat-icon bg-info bg-opacity-10 text-info mx-auto"><i class="fas fa-droplet"></i></div>
                    <p class="text-secondary small fw-bold mb-1">KELEMBAPAN</p>
                    <div class="val-big text-white"><span id="txtLembap">0.0</span><span class="unit">%</span></div>
                    <canvas id="gaugeLembap" class="gauge-canvas"></canvas>
                </div>
            </div>
            <div class="col-md-3 text-center">
                <div class="card-custom p-4">
                    <div class="stat-icon bg-warning bg-opacity-10 text-warning mx-auto"><i class="fas fa-smog"></i></div>
                    <p class="text-secondary small fw-bold mb-1">KADAR GAS</p>
                    <div class="val-big text-white"><span id="txtGas">0</span><span class="unit">ppm</span></div>
                    <canvas id="gaugeGas" class="gauge-canvas"></canvas>
                </div>
            </div>
            <div class="col-md-3 text-center">
                <div class="card-custom p-4" id="cardStatus">
                    <div class="stat-icon bg-success bg-opacity-10 text-success mx-auto" id="iconStatus"><i class="fas fa-shield-alt"></i></div>
                    <p class="text-secondary small fw-bold mb-1">STATUS</p>
                    <div class="val-big status-safe" id="txtStatus">AMAN</div>
                    <div class="mt-3 small text-secondary" id="lastUpdate">Waiting for signal...</div>
                </div>
            </div>
        </div>

        <div class="row g-4 mb-4">
            <div class="col-lg-8">
                <div class="card-custom p-4">
                    <h6 class="fw-bold mb-4"><i class="fas fa-chart-line me-2 text-primary"></i>Grafik Real-time</h6>
                    <div style="height: 350px;"><canvas id="iotChart"></canvas></div>
                </div>
            </div>
            <div class="col-lg-4">
                <div class="card-custom p-4">
                    <h6 class="fw-bold mb-3"><i class="fas fa-history me-2 text-info"></i>History Lokal</h6>
                    <div class="table-responsive" style="max-height: 330px;">
                        <table class="table table-dark table-hover small">
                            <thead>
                                <tr><th>Jam</th><th>Temp</th><th>Hum</th><th>Gas</th></tr>
                            </thead>
                            <tbody id="tableBody"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

        <div class="row mb-5">
            <div class="col-12">
                <div class="card-custom p-4">
                    <h6 class="fw-bold mb-3"><i class="fas fa-database me-2 text-success"></i>Cloud Storage (Google Sheets)</h6>
                    <iframe src="https://docs.google.com/spreadsheets/d/e/2PACX-1vS71wF9Gu0F__jdETIntozU_eVbgvtR4SmP9Nr-IuxKtWQERKs9UX4vcNyFDKIW-d3mTJb4poqiU4Ip/pubhtml?widget=true&amp;headers=false"></iframe>
                </div>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://monitoring-iot-9ed03-default-rtdb.asia-southeast1.firebasedatabase.app/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let isRunning = false;
        let lastStatus = "AMAN";

        const gaugeOpts = {
            angle: -0.2, lineWidth: 0.2, radiusScale: 1,
            pointer: { length: 0.6, strokeWidth: 0.035, color: '#FFFFFF' },
            limitMax: false, limitMin: false, strokeColor: '#1e293b', generateGradient: true, highDpiSupport: true,
        };

        const gSuhu = new Gauge(document.getElementById('gaugeSuhu')).setOptions({...gaugeOpts, colorStart: '#ef4444', staticZones: [{strokeStyle: "#3b82f6", min: 0, max: 25}, {strokeStyle: "#10b981", min: 25, max: 35}, {strokeStyle: "#ef4444", min: 35, max: 60}]});
        gSuhu.maxValue = 60; gSuhu.setMinValue(0); gSuhu.set(0);

        const gLembap = new Gauge(document.getElementById('gaugeLembap')).setOptions({...gaugeOpts, colorStart: '#3b82f6'});
        gLembap.maxValue = 100; gLembap.setMinValue(0); gLembap.set(0);

        const gGas = new Gauge(document.getElementById('gaugeGas')).setOptions({...gaugeOpts, colorStart: '#f59e0b', staticZones: [{strokeStyle: "#10b981", min: 0, max: 200}, {strokeStyle: "#f59e0b", min: 200, max: 500}, {strokeStyle: "#ef4444", min: 500, max: 1000}]});
        gGas.maxValue = 1000; gGas.setMinValue(0); gGas.set(0);

        function speak(text) {
            if ('speechSynthesis' in window) {
                const msg = new SpeechSynthesisUtterance();
                msg.text = text; msg.lang = 'id-ID';
                window.speechSynthesis.speak(msg);
            }
        }

        const ctx = document.getElementById('iotChart').getContext('2d');
        const iotChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: [],
                datasets: [
                    { label: 'Suhu (°C)', data: [], borderColor: '#ef4444', backgroundColor: 'rgba(239, 68, 68, 0.1)', fill: true, tension: 0.4 },
                    { label: 'Lembap (%)', data: [], borderColor: '#3b82f6', backgroundColor: 'rgba(59, 130, 246, 0.1)', fill: true, tension: 0.4 },
                    { label: 'Gas (ppm)', data: [], borderColor: '#f59e0b', backgroundColor: 'rgba(245, 158, 11, 0.1)', fill: true, tension: 0.4 }
                ]
            },
            options: {
                responsive: true, maintainAspectRatio: false,
                plugins: { legend: { labels: { color: '#94a3b8' } } },
                scales: { x: { ticks: { color: '#94a3b8' }, grid: { display: false } }, y: { ticks: { color: '#94a3b8' }, grid: { color: '#1e293b' } } }
            }
        });

        db.ref("Sensor").on("value", (snap) => {
            if(!isRunning) return;
            const data = snap.val();
            const time = new Date().toLocaleTimeString();

            document.getElementById("txtSuhu").innerText = data.Suhu.toFixed(1);
            document.getElementById("txtLembap").innerText = data.Kelembapan.toFixed(1);
            document.getElementById("txtGas").innerText = data.KadarGas;
            document.getElementById("lastUpdate").innerText = "Last Sync: " + time;

            gSuhu.set(data.Suhu);
            gLembap.set(data.Kelembapan);
            gGas.set(data.KadarGas);

            const txtStatus = document.getElementById("txtStatus");
            const iconStatus = document.getElementById("iconStatus");
            const cardStatus = document.getElementById("cardStatus");

            if(data.Status === "BAHAYA") {
                txtStatus.innerText = "BAHAYA!";
                txtStatus.className = "val-big status-danger";
                cardStatus.classList.add("bg-danger-glow");
                iconStatus.innerHTML = '<i class="fas fa-exclamation-triangle"></i>';
                iconStatus.className = "stat-icon bg-danger text-white mx-auto";
                if(lastStatus !== "BAHAYA") { speak("Peringatan, terdeteksi kebocoran gas."); lastStatus = "BAHAYA"; }
            } else {
                txtStatus.innerText = "AMAN";
                txtStatus.className = "val-big status-safe";
                cardStatus.classList.remove("bg-danger-glow");
                iconStatus.innerHTML = '<i class="fas fa-shield-alt"></i>';
                iconStatus.className = "stat-icon bg-success bg-opacity-10 text-success mx-auto";
                lastStatus = "AMAN";
            }

            if(iotChart.data.labels.length > 15) {
                iotChart.data.labels.shift();
                iotChart.data.datasets.forEach(d => d.data.shift());
            }
            iotChart.data.labels.push(time);
            iotChart.data.datasets[0].data.push(data.Suhu);
            iotChart.data.datasets[1].data.push(data.Kelembapan);
            iotChart.data.datasets[2].data.push(data.KadarGas);
            iotChart.update('none');

            const body = document.getElementById("tableBody");
            const row = `<tr><td>${time}</td><td>${data.Suhu.toFixed(1)}°</td><td>${data.Kelembapan.toFixed(1)}%</td><td>${data.KadarGas}</td></tr>`;
            body.insertAdjacentHTML('afterbegin', row);
            if(body.rows.length > 10) body.deleteRow(10);
        });

        document.getElementById("btnStart").onclick = () => {
            isRunning = true;
            document.getElementById("liveDot").style.display = "inline-block";
            document.getElementById("logStatus").className = "badge-status bg-success text-white";
            document.getElementById("logStatus").innerHTML = '<i class="fas fa-sync-alt fa-spin me-1"></i> Live Logging';
            speak("Sistem monitoring diaktifkan.");
        };
        document.getElementById("btnStop").onclick = () => {
            isRunning = false;
            document.getElementById("liveDot").style.display = "none";
            document.getElementById("logStatus").className = "badge-status bg-danger text-white";
            document.getElementById("logStatus").innerHTML = '<i class="fas fa-stop-circle me-1"></i> Stopped';
        };
        document.getElementById("btnReset").onclick = () => {
            document.getElementById("tableBody").innerHTML = "";
            iotChart.data.labels = [];
            iotChart.data.datasets.forEach(d => d.data = []);
            iotChart.update();
        };

        const intervalInput = document.getElementById("intervalInput");
        intervalInput.onchange = () => {
            const val = parseInt(intervalInput.value);
            if (val >= 1) db.ref("Settings").update({ JedaUpdate: val });
        };

        db.ref("Settings/JedaUpdate").once("value", (snapshot) => {
            if (snapshot.exists()) { intervalInput.value = snapshot.val(); }
        });
    </script>
</body>
</html>
