<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IoT Analytics - Dark Edition</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root { --bg-dark: #0b0f19; --card-bg: #161c2d; --accent: #3b82f6; }
        body { background-color: var(--bg-dark); color: #e2e8f0; font-family: 'Plus Jakarta Sans', sans-serif; }
        
        .header-glass { background: rgba(22, 28, 45, 0.8); backdrop-filter: blur(12px); border-bottom: 1px solid #2d3748; sticky: top; }
        .card-custom { background: var(--card-bg); border: 1px solid #2d3748; border-radius: 1.25rem; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3); }
        
        .stat-icon { width: 48px; height: 48px; border-radius: 12px; display: flex; align-items: center; justify-content: center; margin-bottom: 1rem; }
        .val-big { font-size: 2.25rem; font-weight: 800; letter-spacing: -1px; }
        .unit { font-size: 1rem; color: #94a3b8; margin-left: 4px; }
        
        .btn-action { border-radius: 10px; font-weight: 600; padding: 10px 20px; transition: 0.3s; }
        .btn-start { background: #10b981; color: white; border: none; }
        .btn-stop { background: #ef4444; color: white; border: none; }
        
        .table-custom { color: #cbd5e1; border-color: #2d3748; }
        .badge-status { padding: 6px 12px; border-radius: 20px; font-size: 0.75rem; text-transform: uppercase; font-weight: 700; }
        
        iframe { border-radius: 1.25rem; border: 1px solid #2d3748; height: 450px; width: 100%; }
    </style>
</head>
<body>

    <nav class="header-glass py-3 mb-4 sticky-top">
        <div class="container d-flex justify-content-between align-items-center">
            <div class="d-flex align-items-center">
                <i class="fas fa-bolt text-warning me-2 fs-4"></i>
                <h5 class="mb-0 fw-bold">PROYEK MONITORING IOT</h5>
            </div>
            <span id="logStatus" class="badge-status bg-secondary"><i class="fas fa-pause-circle me-1"></i> Idle</span>
        </div>
    </nav>

    <div class="container">
        <div class="row mb-4">
            <div class="col-12">
                <div class="card-custom p-3 d-flex flex-wrap align-items-center gap-3">
                    <button id="btnStart" class="btn-action btn-start"><i class="fas fa-play me-2"></i>START LOGGING</button>
                    <button id="btnStop" class="btn-action btn-stop"><i class="fas fa-stop me-2"></i>STOP</button>
                    <button id="btnReset" class="btn btn-outline-light border-secondary btn-action">RESET TABLE</button>
                    
                    <div class="ms-md-auto d-flex align-items-center gap-2">
                        <span class="small text-secondary">Update (Detik):</span>
                        <input type="number" id="intervalInput" class="form-control bg-dark text-white border-secondary shadow-none" value="2" style="width: 80px;">
                    </div>
                </div>
            </div>
        </div>

        <div class="row g-4 mb-4">
            <div class="col-md-4">
                <div class="card-custom p-4">
                    <div class="stat-icon bg-danger bg-opacity-10 text-danger"><i class="fas fa-thermometer-half"></i></div>
                    <p class="text-secondary mb-1">Temperatur</p>
                    <div class="val-big text-white"><span id="txtSuhu">0.00</span><span class="unit">°C</span></div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card-custom p-4">
                    <div class="stat-icon bg-info bg-opacity-10 text-info"><i class="fas fa-droplet"></i></div>
                    <p class="text-secondary mb-1">Kelembapan</p>
                    <div class="val-big text-white"><span id="txtLembap">0.00</span><span class="unit">%</span></div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card-custom p-4">
                    <div class="stat-icon bg-warning bg-opacity-10 text-warning"><i class="fas fa-mask-ventilator"></i></div>
                    <p class="text-secondary mb-1">Kadar Gas</p>
                    <div class="val-big text-white"><span id="txtGas">0</span><span class="unit">ppm</span></div>
                </div>
            </div>
        </div>

        <div class="row g-4 mb-4">
            <div class="col-lg-8">
                <div class="card-custom p-4">
                    <h6 class="fw-bold mb-4">Grafik Real-time (Multi-Scale)</h6>
                    <div style="height: 350px;">
                        <canvas id="iotChart"></canvas>
                    </div>
                </div>
            </div>
            <div class="col-lg-4">
                <div class="card-custom p-4">
                    <h6 class="fw-bold mb-3">History Lokal</h6>
                    <div class="table-responsive" style="max-height: 330px;">
                        <table class="table table-dark table-custom small">
                            <thead>
                                <tr><th>Jam</th><th>Temp</th><th>Hum</th><th>Gas</th></tr>
                            </thead>
                            <tbody id="tableBody"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

        <div class="row mb-5">
            <div class="col-12">
                <div class="card-custom p-4">
                    <h6 class="fw-bold mb-3"><i class="fas fa-database me-2 text-success"></i>Cloud Storage (Google Sheets)</h6>
                    <iframe src="https://docs.google.com/spreadsheets/d/e/2PACX-1vS71wF9Gu0F__jdETIntozU_eVbgvtR4SmP9Nr-IuxKtWQERKs9UX4vcNyFDKIW-d3mTJb4poqiU4Ip/pubhtml?widget=true&amp;headers=false"></iframe>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- KONFIGURASI FIREBASE ---
        const firebaseConfig = {
            databaseURL: "https://monitoring-iot-9ed03-default-rtdb.asia-southeast1.firebasedatabase.app/"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let isRunning = false;
        
        // --- INISIALISASI CHART ---
        const ctx = document.getElementById('iotChart').getContext('2d');
        const iotChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: [],
                datasets: [
                    { label: 'Suhu (°C)', data: [], borderColor: '#ef4444', tension: 0.3, yAxisID: 'y1' },
                    { label: 'Lembap (%)', data: [], borderColor: '#3b82f6', tension: 0.3, yAxisID: 'y1' },
                    { label: 'Gas (ppm)', data: [], borderColor: '#f59e0b', tension: 0.3, yAxisID: 'y2' }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    y1: { type: 'linear', position: 'left', grid: { color: '#2d3748' } },
                    y2: { type: 'linear', position: 'right', grid: { drawOnChartArea: false } }
                },
                plugins: { legend: { labels: { color: '#94a3b8' } } }
            }
        });

        // --- FUNGSI UPDATE DATA ---
        db.ref("Sensor").on("value", (snap) => {
            if(!isRunning) return;
            
            const data = snap.val();
            const time = new Date().toLocaleTimeString();

            // Update Angka
            document.getElementById("txtSuhu").innerText = data.Suhu.toFixed(2);
            document.getElementById("txtLembap").innerText = data.Kelembapan.toFixed(2);
            document.getElementById("txtGas").innerText = data.KadarGas;

            // Update Grafik (Batasi 15 data)
            if(iotChart.data.labels.length > 15) {
                iotChart.data.labels.shift();
                iotChart.data.datasets.forEach(d => d.data.shift());
            }
            iotChart.data.labels.push(time);
            iotChart.data.datasets[0].data.push(data.Suhu);
            iotChart.data.datasets[1].data.push(data.Kelembapan);
            iotChart.data.datasets[2].data.push(data.KadarGas);
            iotChart.update('none'); // Update tanpa animasi agar ringan

            // Update Tabel
            const body = document.getElementById("tableBody");
            const row = `<tr><td>${time}</td><td>${data.Suhu.toFixed(1)}°</td><td>${data.Kelembapan.toFixed(1)}%</td><td>${data.KadarGas}</td></tr>`;
            body.insertAdjacentHTML('afterbegin', row);
            if(body.rows.length > 10) body.deleteRow(10);
        });

        // --- KONTROL TOMBOL ---
        document.getElementById("btnStart").onclick = () => {
            isRunning = true;
            document.getElementById("logStatus").className = "badge-status bg-success text-white";
            document.getElementById("logStatus").innerHTML = '<i class="fas fa-sync-alt fa-spin me-1"></i> Live Logging';
        }
        document.getElementById("btnStop").onclick = () => {
            isRunning = false;
            document.getElementById("logStatus").className = "badge-status bg-danger text-white";
            document.getElementById("logStatus").innerHTML = '<i class="fas fa-stop-circle me-1"></i> Stopped';
        }
        document.getElementById("btnReset").onclick = () => {
            document.getElementById("tableBody").innerHTML = "";
            iotChart.data.labels = [];
            iotChart.data.datasets.forEach(d => d.data = []);
            iotChart.update();
        }
    </script>
</body>
</html>
