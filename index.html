<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IoT Analytics Pro - Full System</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://bernii.github.io/gauge.js/dist/gauge.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/countup.js/1.9.3/countUp.min.js"></script>

    <style>
        :root { --bg-dark: #020617; --card-bg: rgba(15, 23, 42, 0.7); }
        
        body { 
            background-color: var(--bg-dark); 
            color: #e2e8f0; 
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-image: radial-gradient(circle at 50% -20%, #1e293b 0%, #020617 80%);
            min-height: 100vh;
        }
        
        .header-glass { 
            background: rgba(15, 23, 42, 0.8); 
            backdrop-filter: blur(15px); 
            border-bottom: 1px solid rgba(255,255,255,0.05); 
            position: sticky; top: 0; z-index: 1000; 
        }
        
        .card-custom { 
            background: var(--card-bg); 
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.1); 
            border-radius: 1.5rem; 
            transition: all 0.3s ease;
            height: 100%;
        }
        
        .card-custom:hover { transform: translateY(-8px); border-color: rgba(59, 130, 246, 0.5); }

        .pg-bar { height: 6px; background: rgba(255,255,255,0.05); border-radius: 10px; overflow: hidden; margin: 15px 0; }
        .pg-inner { height: 100%; width: 0%; transition: width 1s ease-in-out; border-radius: 10px; }

        .live-dot {
            width: 10px; height: 10px; background: #10b981; border-radius: 50%;
            display: inline-block; margin-right: 8px;
            animation: pulse-dot 2s infinite;
        }
        @keyframes pulse-dot { 0%, 100% { transform: scale(0.9); opacity: 1; } 50% { transform: scale(1.2); opacity: 0.5; } }

        @keyframes pulse-red { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); } 70% { box-shadow: 0 0 0 20px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }
        .bg-danger-glow { animation: pulse-red 1.5s infinite; border-color: #ef4444 !important; background: rgba(239, 68, 68, 0.1) !important; }

        .stat-icon { width: 50px; height: 50px; border-radius: 15px; display: flex; align-items: center; justify-content: center; margin-bottom: 1rem; font-size: 1.2rem; }
        .val-big { font-size: 2.5rem; font-weight: 800; letter-spacing: -1px; margin: 5px 0; }
        .unit { font-size: 1rem; color: #94a3b8; margin-left: 4px; }
        
        .btn-action { border-radius: 15px; font-weight: 700; padding: 12px 25px; transition: 0.3s; border: none; }
        .btn-start { background: linear-gradient(135deg, #10b981, #059669); color: white; }
        .btn-stop { background: linear-gradient(135deg, #ef4444, #dc2626); color: white; }
        
        .badge-status { padding: 10px 20px; border-radius: 12px; font-size: 0.8rem; font-weight: 800; }
        iframe { border-radius: 1.5rem; border: 1px solid rgba(255,255,255,0.1); height: 400px; width: 100%; }
        canvas.gauge-canvas { width: 100% !important; max-width: 140px; margin: 10px auto; display: block; }
    </style>
</head>
<body>

    <nav class="header-glass py-3 mb-4">
        <div class="container d-flex justify-content-between align-items-center">
            <div class="d-flex align-items-center">
                <div class="bg-primary p-2 rounded-3 me-3"><i class="fas fa-bolt text-white"></i></div>
                <h4 class="mb-0 fw-800 text-white">IOT ANALYTICS <span class="text-primary">PRO</span></h4>
            </div>
            <span id="logStatus" class="badge-status bg-dark border border-secondary text-secondary"><i class="fas fa-circle-notch me-2"></i>STANDBY</span>
        </div>
    </nav>

    <div class="container">
        <div class="row mb-5">
            <div class="col-12">
                <div class="card-custom p-3 d-flex flex-wrap align-items-center gap-3">
                    <button id="btnStart" class="btn-action btn-start shadow-lg"><i class="fas fa-play-circle me-2"></i>START LOGGING</button>
                    <button id="btnStop" class="btn-action btn-stop shadow-lg"><i class="fas fa-power-off me-2"></i>STOP</button>
                    <button id="btnReset" class="btn btn-outline-light border-secondary btn-action px-4">CLEAR LOG</button>
                    
                    <div class="ms-md-auto d-flex align-items-center gap-3 bg-black bg-opacity-25 p-2 px-3 rounded-pill border border-secondary">
                        <span class="live-dot" id="liveDot" style="display:none;"></span>
                        <span class="small text-secondary fw-bold">JEDA:</span>
                        <input type="number" id="intervalInput" class="form-control form-control-sm bg-transparent text-white border-0 text-center fw-bold" value="2" style="width: 50px;">
                        <span class="small text-secondary">DETIK</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="row g-4 mb-4 text-center">
            <div class="col-md-3">
                <div class="card-custom p-4">
                    <div class="stat-icon bg-danger bg-opacity-20 text-danger mx-auto"><i class="fas fa-thermometer-half"></i></div>
                    <span class="text-secondary small fw-bold">TEMPERATUR</span>
                    <div class="val-big text-white"><span id="txtSuhu">0.0</span><span class="unit">°C</span></div>
                    <div class="pg-bar"><div id="barSuhu" class="pg-inner bg-danger"></div></div>
                    <canvas id="gaugeSuhu" class="gauge-canvas"></canvas>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card-custom p-4">
                    <div class="stat-icon bg-info bg-opacity-20 text-info mx-auto"><i class="fas fa-droplet"></i></div>
                    <span class="text-secondary small fw-bold">KELEMBAPAN</span>
                    <div class="val-big text-white"><span id="txtLembap">0.0</span><span class="unit">%</span></div>
                    <div class="pg-bar"><div id="barLembap" class="pg-inner bg-info"></div></div>
                    <canvas id="gaugeLembap" class="gauge-canvas"></canvas>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card-custom p-4">
                    <div class="stat-icon bg-warning bg-opacity-20 text-warning mx-auto"><i class="fas fa-smog"></i></div>
                    <span class="text-secondary small fw-bold">KADAR GAS</span>
                    <div class="val-big text-white"><span id="txtGas">0</span><span class="unit">ppm</span></div>
                    <div class="pg-bar"><div id="barGas" class="pg-inner bg-warning"></div></div>
                    <canvas id="gaugeGas" class="gauge-canvas"></canvas>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card-custom p-4" id="cardStatus">
                    <div class="stat-icon bg-success bg-opacity-20 text-success mx-auto" id="iconStatus"><i class="fas fa-shield-alt"></i></div>
                    <span class="text-secondary small fw-bold">STATUS</span>
                    <div class="val-big" id="txtStatus" style="color:#10b981">SAFE</div>
                    <div class="mt-2 small opacity-50 text-secondary" id="lastUpdate">No Signal</div>
                </div>
            </div>
        </div>

        <div class="row g-4 mb-4">
            <div class="col-lg-8">
                <div class="card-custom p-4">
                    <h6 class="fw-bold mb-4"><i class="fas fa-chart-line me-2 text-primary"></i>Analytics Stream</h6>
                    <div style="height: 350px;"><canvas id="iotChart"></canvas></div>
                </div>
            </div>
            <div class="col-lg-4">
                <div class="card-custom p-4">
                    <h6 class="fw-bold mb-3"><i class="fas fa-history me-2 text-info"></i>History Lokal</h6>
                    <div class="table-responsive" style="max-height: 330px;">
                        <table class="table table-dark table-hover small">
                            <thead class="text-secondary">
                                <tr><th>Jam</th><th>Temp</th><th>Gas</th></tr>
                            </thead>
                            <tbody id="tableBody"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

        <div class="row mb-5">
            <div class="col-12">
                <div class="card-custom p-4">
                    <h6 class="fw-bold mb-3"><i class="fas fa-database me-2 text-success"></i>Cloud Storage (Google Sheets)</h6>
                    <iframe src="https://docs.google.com/spreadsheets/d/e/2PACX-1vS71wF9Gu0F__jdETIntozU_eVbgvtR4SmP9Nr-IuxKtWQERKs9UX4vcNyFDKIW-d3mTJb4poqiU4Ip/pubhtml?widget=true&amp;headers=false"></iframe>
                </div>
            </div>
        </div>
    </div>

    <script>
        // FIREBASE SETUP
        const firebaseConfig = { databaseURL: "https://monitoring-iot-9ed03-default-rtdb.asia-southeast1.firebasedatabase.app/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let isRunning = false;
        let lastStatus = "AMAN";

        // GAUGE SETUP
        const gOpt = { angle: -0.2, lineWidth: 0.2, pointer: { length: 0.6, color: '#FFF' }, strokeColor: '#1e293b', generateGradient: true, highDpiSupport: true };
        const gS = new Gauge(document.getElementById('gaugeSuhu')).setOptions(gOpt); gS.maxValue = 60; gS.set(0);
        const gL = new Gauge(document.getElementById('gaugeLembap')).setOptions(gOpt); gL.maxValue = 100; gL.set(0);
        const gG = new Gauge(document.getElementById('gaugeGas')).setOptions(gOpt); gG.maxValue = 1000; gG.set(0);

        // CHART SETUP
        const iotChart = new Chart(document.getElementById('iotChart'), {
            type: 'line',
            data: { labels: [], datasets: [
                { label: 'Temp (°C)', data: [], borderColor: '#ef4444', backgroundColor: 'rgba(239,68,68,0.1)', fill: true, tension: 0.4 },
                { label: 'Gas (ppm)', data: [], borderColor: '#f59e0b', backgroundColor: 'rgba(245,158,11,0.1)', fill: true, tension: 0.4 }
            ]},
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { labels: { color: '#94a3b8' } } } }
        });

        // ANIMATION (CountUp)
        const cS = new CountUp('txtSuhu', 0, { decimalPlaces: 1, duration: 1 });
        const cL = new CountUp('txtLembap', 0, { decimalPlaces: 1, duration: 1 });
        const cG = new CountUp('txtGas', 0, { duration: 1 });
        cS.start(); cL.start(); cG.start();

        // VOICE ALERT
        function speak(text) {
            if ('speechSynthesis' in window) {
                const msg = new SpeechSynthesisUtterance(text);
                msg.lang = 'id-ID'; window.speechSynthesis.speak(msg);
            }
        }

        // FIREBASE LISTENER
        db.ref("Sensor").on("value", (snap) => {
            if(!isRunning) return;
            const data = snap.val();
            if(!data) return;

            const time = new Date().toLocaleTimeString();

            // Update UI
            cS.update(data.Suhu); cL.update(data.Kelembapan); cG.update(data.KadarGas);
            gS.set(data.Suhu); gL.set(data.Kelembapan); gG.set(data.KadarGas);
            
            document.getElementById("barSuhu").style.width = (data.Suhu/60*100) + "%";
            document.getElementById("barLembap").style.width = data.Kelembapan + "%";
            document.getElementById("barGas").style.width = (data.KadarGas/1000*100) + "%";
            document.getElementById("lastUpdate").innerText = "Update: " + time;

            // Status Logic
            const tStat = document.getElementById("txtStatus");
            const cStat = document.getElementById("cardStatus");
            if(data.Status === "BAHAYA") {
                tStat.innerText = "DANGER"; tStat.style.color = "#ef4444";
                cStat.classList.add("bg-danger-glow");
                if(lastStatus !== "BAHAYA") { speak("Peringatan kebocoran gas!"); lastStatus = "BAHAYA"; }
            } else {
                tStat.innerText = "SAFE"; tStat.style.color = "#10b981";
                cStat.classList.remove("bg-danger-glow");
                lastStatus = "AMAN";
            }

            // History & Chart
            const row = `<tr><td>${time}</td><td>${data.Suhu.toFixed(1)}°</td><td>${data.KadarGas}</td></tr>`;
            document.getElementById("tableBody").insertAdjacentHTML('afterbegin', row);
            if(iotChart.data.labels.length > 10) { iotChart.data.labels.shift(); iotChart.data.datasets.forEach(d=>d.data.shift()); }
            iotChart.data.labels.push(time);
            iotChart.data.datasets[0].data.push(data.Suhu);
            iotChart.data.datasets[1].data.push(data.KadarGas);
            iotChart.update();
        });

        // BUTTON ACTIONS
        document.getElementById("btnStart").onclick = () => {
            isRunning = true;
            document.getElementById("liveDot").style.display = "inline-block";
            document.getElementById("logStatus").className = "badge-status bg-primary text-white";
            document.getElementById("logStatus").innerHTML = "LINK ACTIVE";
        };
        document.getElementById("btnStop").onclick = () => {
            isRunning = false;
            document.getElementById("liveDot").style.display = "none";
            document.getElementById("logStatus").className = "badge-status bg-dark text-secondary";
            document.getElementById("logStatus").innerHTML = "SHUTDOWN";
        };
        document.getElementById("btnReset").onclick = () => location.reload();

        // INTERVAL SYNC
        const intervalInput = document.getElementById("intervalInput");
        intervalInput.onchange = () => {
            const val = parseInt(intervalInput.value);
            if (val >= 1) db.ref("Settings").update({ JedaUpdate: val });
        };
    </script>
</body>
</html>
